<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTRIKU CLOUD AI 🧠</title>
    <style>
        :root { --primary: #065f46; --secondary: #10b981; --accent: #fbbf24; --bg: #022c22; --card-bg: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #ddd; margin: 10px 0; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .btn-latihan { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        #play-area, #latihan-setup, #result-area { display: none; }
        .opsi { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #e5e7eb; border-radius: 16px; background: white; text-align: left; color: #374151; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="latihan-setup" style="display: block;">
        <div class="card">
            <h2 style="color:var(--accent)">Smart AI Generator</h2>
            <p style="font-size: 12px; opacity: 0.8;">Sistem akan membuat soal unik menggunakan teknologi LLM (seperti ChatGPT).</p>
            
            <label>Masukkan API KEY Gemini:</label>
            <input type="password" id="api-key" placeholder="Tempel API Key di sini...">
            
            <label>Mata Pelajaran:</label>
            <input type="text" id="ai-mapel" placeholder="Contoh: Sejarah Dunia, Fisika Kuantum...">
            
            <label>Tingkatan:</label>
            <select id="ai-level">
                <option value="SD">SD (Bahasa Sederhana)</option>
                <option value="SMP">SMP</option>
                <option value="SMA">SMA</option>
                <option value="Perguruan Tinggi">Kuliah (Analisis Berat)</option>
            </select>
            
            <button class="btn btn-latihan" id="btn-generate" onclick="generateWithAI()">GENERATE SOAL DENGAN AI</button>
        </div>
    </div>

    <div id="play-area">
        <div class="card" style="background: white; color: #333;">
            <div id="progress-text" style="color: var(--primary); font-weight: bold;"></div>
            <h3 id="txt-soal"></h3>
            <div id="list-opsi"></div>
        </div>
    </div>
</div>

<script>
    let bankSoal = [];
    let currentIdx = 0;

    async function generateWithAI() {
        const apiKey = document.getElementById('api-key').value;
        const mapel = document.getElementById('ai-mapel').value;
        const level = document.getElementById('ai-level').value;
        const btn = document.getElementById('btn-generate');

        if (!apiKey || !mapel) return alert("API Key dan Mapel wajib diisi!");

        btn.disabled = true;
        btn.innerText = "AI SEDANG BERPIKIR...";

        // Prompt (Perintah) untuk AI agar memberikan hasil dalam format JSON yang bisa dibaca sistem
        const prompt = `Buatkan 5 soal pilihan ganda tentang ${mapel} untuk tingkat ${level}. 
        Berikan jawaban dalam format JSON murni (array of objects) dengan struktur: 
        [{"p": "pertanyaan", "o": ["jawaban benar", "salah1", "salah2", "salah3"]}]. 
        Jangan berikan penjelasan apapun selain JSON.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            // Membersihkan teks dari markdown jika AI menyertakannya
            const cleanJson = aiText.replace(/```json|```/g, "").trim();
            bankSoal = JSON.parse(cleanJson);

            startQuiz();
        } catch (error) {
            console.error(error);
            alert("Gagal memanggil AI. Pastikan API Key benar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "GENERATE SOAL DENGAN AI";
        }
    }

    function startQuiz() {
        document.getElementById('latihan-setup').style.display = 'none';
        document.getElementById('play-area').style.display = 'block';
        currentIdx = 0;
        renderSoal();
    }

    function renderSoal() {
        if (currentIdx >= bankSoal.length) {
            alert("Ujian selesai!");
            location.reload();
            return;
        }

        const s = bankSoal[currentIdx];
        document.getElementById('progress-text').innerText = `Soal ${currentIdx + 1} dari ${bankSoal.length}`;
        document.getElementById('txt-soal').innerText = s.p;
        
        const list = document.getElementById('list-opsi');
        list.innerHTML = "";

        // Acak posisi pilihan
        let options = s.o.map((txt, i) => ({ txt, isCorrect: i === 0 })).sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = "opsi";
            b.innerText = opt.txt;
            b.onclick = () => {
                if (opt.isCorrect) alert("Benar!");
                else alert("Salah!");
                currentIdx++;
                renderSoal();
            };
            list.appendChild(b);
        });
    }
</script>
</body>
</html>
