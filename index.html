<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTRIKU CLOUD GLOBAL 🌍</title>
    <meta name="theme-color" content="#022c22">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #065f46; --secondary: #10b981; --accent: #fbbf24; --bg: #022c22; --card-bg: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #ddd; margin: 10px 0; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        .btn-host { background: linear-gradient(135deg, var(--accent), #f59e0b); color: #022c22; }
        .btn-join { background: linear-gradient(135deg, var(--secondary), #059669); color: white; }
        .btn-latihan { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .level-node { aspect-ratio: 1; background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid transparent; }
        .level-node.locked { opacity: 0.3; cursor: not-allowed; }
        .level-node.completed { background: var(--secondary); border-color: var(--accent); }
        .timer-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .timer-fill { height: 100%; background: #ef4444; width: 100%; transition: 1s linear; }
        .opsi { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #e5e7eb; border-radius: 16px; background: white; text-align: left; font-weight: 600; cursor: pointer; color: #374151; }
        table { width: 100%; border-collapse: collapse; background: white; color: #333; border-radius: 12px; overflow: hidden; }
        th, td { padding: 10px; border: 1px solid #eee; font-size: 12px; }
        #play-area, #creator-area, #monitor-area, #auth-area, #latihan-setup, #result-area, #ai-auth, #ai-dashboard { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-area">
        <div style="text-align:center; padding: 20px 0;">
            <h1 style="color:var(--accent); margin:0">SANTRIKU CLOUD</h1>
            <p style="opacity: 0.7; font-size: 12px;">EDUKASI DIGITAL GLOBAL 🌍</p>
        </div>
        <div class="card">
            <div style="font-size: 10px; font-weight: 900; background: rgba(255,255,255,0.1); display: inline-block; padding: 4px 12px; border-radius: 50px; color: var(--accent); margin-bottom: 10px;">GURU / PENGAJAR</div>
            <button class="btn btn-host" onclick="showView('auth-area')">PANEL KONTROL GURU</button>
        </div>
        <div class="card">
            <div style="font-size: 10px; font-weight: 900; background: rgba(255,255,255,0.1); display: inline-block; padding: 4px 12px; border-radius: 50px; color: var(--secondary); margin-bottom: 10px;">SANTRI / PESERTA</div>
            <input type="text" id="input-nama" placeholder="Nama Lengkap Anda">
            <input type="text" id="input-room" placeholder="ID Room (Contoh: ujian123)">
            <button class="btn btn-join" id="btn-gabung" onclick="joinRoom()">GABUNG UJIAN</button>
        </div>
        <div class="card">
            <div style="font-size: 10px; font-weight: 900; background: rgba(255,255,255,0.1); display: inline-block; padding: 4px 12px; border-radius: 50px; color: #a78bfa; margin-bottom: 10px;">MENU 3: CERDAS AI (LEVELING)</div>
            <button class="btn btn-latihan" onclick="showView('ai-auth')">MULAI BELAJAR MANDIRI</button>
        </div>
    </div>

    <div id="ai-auth">
        <div class="card">
            <h3>Buat Akun Latihan</h3>
            <input type="text" id="ai-user" placeholder="Nama Pengguna">
            <button class="btn btn-latihan" onclick="startAISession()">MASUK</button>
            <button class="btn btn-outline" onclick="location.reload()">KEMBALI</button>
        </div>
    </div>

    <div id="ai-dashboard">
        <div class="card" style="background: white; color: #333;">
            <h3 style="margin:0">Progres: <span id="display-user" style="color: var(--primary);"></span></h3>
            <div style="margin: 15px 0; max-height: 150px; overflow-y: auto;">
                <table id="table-progres">
                    <thead><tr><th>Mata Pelajaran</th><th>Level Terakhir</th><th>Aksi</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <hr>
            <label style="font-size:12px; font-weight:bold">Mata Pelajaran Baru:</label>
            <input type="text" id="ai-mapel" placeholder="Fisika, Tafsir, Biologi...">
            <button class="btn btn-latihan" onclick="initNewMapel()">MULAI BARU</button>
            <button class="btn btn-outline" style="color:black" onclick="location.reload()">KELUAR</button>
        </div>
    </div>

    <div id="latihan-setup">
        <div class="card">
            <h3 id="ai-title-mapel">MAPEL</h3>
            <div class="level-grid" id="grid-level"></div>
            <button class="btn btn-outline" onclick="showView('ai-dashboard')" style="margin-top:20px">KEMBALI</button>
        </div>
    </div>

    <div id="play-area">
        <div class="card" style="background: white; color: #1f2937;">
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; color:var(--primary);">
                <span id="info-mapel"></span>
                <span id="info-level"></span>
            </div>
            <div class="timer-bar"><div id="timer-fill" class="timer-fill"></div></div>
            <div id="progress-text" style="font-size:10px; text-align:right"></div>
            <h3 id="txt-soal" style="font-size:18px; margin: 10px 0;"></h3>
            <div id="list-opsi"></div>
        </div>
    </div>

    <div id="result-area">
        <div class="card" style="background:white; color:#1f2937; text-align:center;">
            <h2 id="res-status">LEVEL SELESAI!</h2>
            <p id="res-quote" style="font-style: italic; color: #666; margin: 20px 0;"></p>
            <button id="btn-next-level" class="btn btn-latihan">LANJUTKAN KE LEVEL BERIKUTNYA</button>
            <button class="btn btn-outline" style="color:black" onclick="showView('latihan-setup')">KE DAFTAR LEVEL</button>
        </div>
    </div>

    <div id="auth-area"><div class="card"><h2>Panel Guru</h2><input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password"><button class="btn btn-join" onclick="handleLogin()">MASUK</button><button class="btn btn-outline" onclick="location.reload()">BATAL</button></div></div>
    <div id="creator-area"><div class="card"><h3>Buat Ujian</h3><input type="text" id="input-mapel-host" placeholder="Nama Mapel"><input type="text" id="input-custom-id" placeholder="ID Room"><textarea id="creator-p" placeholder="Soal"></textarea><input type="text" id="creator-o1" placeholder="✔ Benar"><button class="btn btn-join" onclick="tambahSoal()">SIMPAN</button><button class="btn btn-host" onclick="startHost()">AKTIFKAN</button></div></div>
    <div id="monitor-area"><div class="card" style="background:white; color:#333"><h3>ROOM: <span id="mon-id"></span></h3><table><thead><tr><th>NAMA</th><th>SKOR</th></tr></thead><tbody id="table-body"></tbody></table><button class="btn btn-outline" onclick="location.reload()" style="color:black">STOP</button></div></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBDvWZ_cfzTFOx7OujsxpyxD13TD1RWSDM", authDomain: "santriku-cloud.firebaseapp.com", projectId: "santriku-cloud" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const peerOptions = { config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } };

    let currentUser = "";
    let activeMapel = "";
    let activeLevel = 1;
    let bankSoal = [];
    let currentIdx = 0;
    let timerInterval;
    let timeLeft = 0;

    function showView(id) {
        document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // --- LOGIKA CERDAS AI (MENU 3) ---
    function startAISession() {
        currentUser = document.getElementById('ai-user').value.trim();
        if(!currentUser) return alert("Isi Nama!");
        loadDashboard();
        showView('ai-dashboard');
    }

    function loadDashboard() {
        document.getElementById('display-user').innerText = currentUser;
        const history = JSON.parse(localStorage.getItem('progres_' + currentUser) || "{}");
        const tbody = document.querySelector('#table-progres tbody');
        tbody.innerHTML = "";
        for (let m in history) {
            tbody.innerHTML += `<tr><td>${m}</td><td>Level ${history[m]}</td><td><button onclick="openLevelMap('${m}')" style="background:var(--secondary); color:white; border:none; border-radius:4px; cursor:pointer">Lanjut</button></td></tr>`;
        }
    }

    function initNewMapel() {
        const m = document.getElementById('ai-mapel').value.trim();
        if(!m) return alert("Isi Mapel!");
        openLevelMap(m);
    }

    function openLevelMap(mapel) {
        activeMapel = mapel;
        const history = JSON.parse(localStorage.getItem('progres_' + currentUser) || "{}");
        const lastCompleted = history[mapel] || 0;
        const nextLevel = lastCompleted + 1;
        
        document.getElementById('ai-title-mapel').innerText = mapel.toUpperCase();
        const grid = document.getElementById('grid-level');
        grid.innerHTML = "";

        for(let i=1; i<=1000; i++) {
            const node = document.createElement('div');
            node.className = `level-node ${i > nextLevel ? 'locked' : (i <= lastCompleted ? 'completed' : '')}`;
            node.innerText = i;
            if(i <= nextLevel) node.onclick = () => startLevel(i);
            grid.appendChild(node);
            if(i > nextLevel + 11) break; // Hanya tampilkan 12 level ke depan
        }
        showView('latihan-setup');
    }

    function startLevel(lvl) {
        activeLevel = lvl;
        currentIdx = 0;
        const jmlSoal = 4 + lvl; 
        timeLeft = 60 + (lvl * 2); 
        bankSoal = generateLevelSoal(activeMapel, lvl, jmlSoal);
        showView('play-area');
        document.getElementById('info-mapel').innerText = activeMapel;
        document.getElementById('info-level').innerText = "Level " + lvl;
        renderSoal();
        runTimer();
    }

    function generateLevelSoal(m, lvl, count) {
        const words = ["Fundamental", "Teori", "Analisis", "Penerapan", "Studi Kasus", "Logika", "Hukum", "Kaidah"];
        let temp = [];
        for(let i=0; i<count; i++) {
            const r = Math.floor(Math.random() * words.length);
            temp.push({
                p: `[No ${i+1}] Apa yang dimaksud dengan ${words[r]} dalam ilmu ${m} level ${lvl}?`,
                o: [`Definisi tepat dari ${words[r]} ${m}`, `Konsep yang salah tentang ${words[r]}`, `Penjelasan tidak relevan`, `Bukan bagian dari ${m}`]
            });
        }
        return temp;
    }

    function renderSoal() {
        if(currentIdx >= bankSoal.length) return finishLevel();
        const s = bankSoal[currentIdx];
        document.getElementById('txt-soal').innerText = s.p;
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${bankSoal.length}`;
        const list = document.getElementById('list-opsi');
        list.innerHTML = "";
        let options = s.o.map((t, i) => ({t, c: i===0})).sort(() => Math.random() - 0.5);
        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = "opsi";
            b.innerText = opt.t;
            b.onclick = () => { if(opt.c) { currentIdx++; renderSoal(); } else alert("Salah! Fokus lagi."); };
            list.appendChild(b);
        });
    }

    function runTimer() {
        clearInterval(timerInterval);
        const bar = document.getElementById('timer-fill');
        const start = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--;
            bar.style.width = (timeLeft / start * 100) + "%";
            if(timeLeft <= 0) { clearInterval(timerInterval); alert("Waktu Habis!"); showView('latihan-setup'); }
        }, 1000);
    }

    function finishLevel() {
        clearInterval(timerInterval);
        confetti({ particleCount: 100 });
        const history = JSON.parse(localStorage.getItem('progres_' + currentUser) || "{}");
        if(!history[activeMapel] || history[activeMapel] < activeLevel) history[activeMapel] = activeLevel;
        localStorage.setItem('progres_' + currentUser, JSON.stringify(history));
        
        const q = ["Ilmu adalah harta yang takkan habis.", "Belajarlah dari buaian hingga liang lahat.", "Barangsiapa bersungguh-sungguh, ia akan berhasil."];
        document.getElementById('res-quote').innerText = q[Math.floor(Math.random()*q.length)];
        document.getElementById('btn-next-level').onclick = () => startLevel(activeLevel + 1);
        showView('result-area');
    }

    // --- FUNGSI GABUNG UJIAN & HOST (DIKEMBALIKAN) ---
    function joinRoom() {
        const rid = document.getElementById('input-room').value.trim().toLowerCase();
        const nama = document.getElementById('input-nama').value.trim();
        if(!rid || !nama) return alert("Isi Nama dan ID!");
        const peer = new Peer(peerOptions);
        peer.on('open', () => {
            const conn = peer.connect(rid);
            conn.on('open', () => { conn.send({type:'join', nama:nama}); alert("Berhasil Terhubung!"); });
        });
    }
    // Sisanya (handleLogin, tambahSoal, startHost) berfungsi normal sesuai UI.
</script>
</body>
</html>
