<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTRIKU CLOUD - Ujian Realtime</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #065f46; --secondary: #10b981; --accent: #fbbf24; --bg: #022c22; --card-bg: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0,0,0,0.4); animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, textarea { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); margin: 10px 0; box-sizing: border-box; background: white; color: #1f2937; font-size: 15px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 8px; font-size: 14px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-host { background: linear-gradient(135deg, var(--accent), #f59e0b); color: #022c22; }
        .btn-join { background: linear-gradient(135deg, var(--secondary), #059669); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        #play-area, #creator-area, #monitor-area, #result-area { display: none; }
        .opsi { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #e5e7eb; border-radius: 16px; background: white; text-align: left; font-weight: 600; cursor: pointer; color: #374151; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 900; background: rgba(255,255,255,0.1); margin-bottom: 10px; }
        .stat-circle { width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--secondary); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; margin: 20px auto; color: var(--primary); background: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; color: #333; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f3f4f6; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-area">
        <div style="text-align:center; padding: 20px 0;">
            <div style="background: var(--accent); width: 60px; height: 60px; border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; transform: rotate(-10deg); margin-bottom: 10px;">
                <i class="fas fa-university fa-2x" style="color:#022c22; transform: rotate(10deg);"></i>
            </div>
            <h1 style="color:var(--accent); letter-spacing:-1px; margin:0">SANTRIKU CLOUD</h1>
            <p style="opacity: 0.7; font-size: 12px;">SISTEM UJIAN REALTIME 🌍</p>
        </div>

        <div class="card">
            <div class="badge" style="color: var(--accent);">MENU 1: GURU</div>
            <button class="btn btn-host" onclick="showView('creator-area')">BUAT RUANG UJIAN</button>
        </div>

        <div class="card">
            <div class="badge" style="color: var(--secondary);">MENU 2: SISWA</div>
            <input type="text" id="input-nama" placeholder="Nama Lengkap">
            <input type="text" id="input-room" placeholder="ID Room dari Guru">
            <button class="btn btn-join" id="btn-gabung" onclick="joinRoom()">GABUNG UJIAN</button>
        </div>
    </div>

    <div id="creator-area">
        <div class="card">
            <h3>Konfigurasi Ujian</h3>
            <input type="text" id="input-mapel" placeholder="Mata Pelajaran">
            <input type="text" id="input-custom-id" placeholder="Buat ID Room (Bebas)">
            <hr style="opacity:0.1; margin:20px 0">
            <p style="font-size:12px; margin-bottom:5px">Input Soal:</p>
            <textarea id="creator-p" placeholder="Pertanyaan..."></textarea>
            <input type="text" id="creator-o1" placeholder="✔ Jawaban Benar">
            <input type="text" id="creator-o2" placeholder="Opsi Salah 1">
            <input type="text" id="creator-o3" placeholder="Opsi Salah 2">
            <input type="text" id="creator-o4" placeholder="Opsi Salah 3">
            <button class="btn btn-join" onclick="tambahSoal()" style="background: #0ea5e9;">TAMBAH SOAL</button>
            <p id="count-soal" style="text-align:center; font-weight:bold; margin:10px 0">Soal Terinput: 0</p>
            <button class="btn btn-host" onclick="startHost()">AKTIFKAN ROOM & MONITOR</button>
            <button class="btn btn-outline" onclick="location.reload()">KEMBALI</button>
        </div>
    </div>

    <div id="monitor-area">
        <div class="card" style="background:white; color:#333">
            <h3 style="margin-top:0">ROOM: <span id="mon-id" style="color:var(--primary)"></span></h3>
            <p style="font-size:11px">Berikan ID di atas kepada Siswa.</p>
            <table>
                <thead>
                    <tr>
                        <th>NAMA</th>
                        <th>SKOR</th>
                        <th>B/S</th>
                        <th>WAKTU</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <button class="btn btn-outline" onclick="location.reload()" style="color:black; border-color:black; margin-top:15px">TUTUP UJIAN</button>
        </div>
    </div>

    <div id="play-area">
        <div id="quiz-box" class="card" style="background: white; color: #1f2937;">
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:bold; color:var(--primary); margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <span id="info-mapel"></span>
                <span id="progress-text"></span>
            </div>
            <h3 id="txt-soal" style="text-align:left; line-height:1.4; font-size: 17px;">Menunggu soal...</h3>
            <div id="list-opsi"></div>
        </div>
    </div>

    <div id="result-area">
        <div class="card" style="background:white; color:#1f2937; text-align:center;">
            <h2>HASIL UJIAN</h2>
            <div class="stat-circle" id="res-skor-anim">0</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 20px 0;">
                <div style="background:#f3f4f6; padding:10px; border-radius:12px;">
                    <small>WAKTU</small><br><strong id="res-waktu">0s</strong>
                </div>
                <div style="background:#f3f4f6; padding:10px; border-radius:12px;">
                    <small>BENAR</small><br><strong id="res-benar">0</strong>
                </div>
            </div>
            <button class="btn btn-host" onclick="location.reload()">KEMBALI KE MENU</button>
        </div>
    </div>
</div>

<script>
    let peer = null, conn = null, bankSoal = [], currentIdx = 0, statBenar = 0, startTime = 0;

    function showView(id) {
        document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // FUNGSI GURU
    function tambahSoal() {
        const p = document.getElementById('creator-p').value;
        const o1 = document.getElementById('creator-o1').value;
        if(!p || !o1) return alert("Minimal Pertanyaan dan Jawaban Benar terisi!");
        
        bankSoal.push({ 
            p: p, 
            o: [o1, document.getElementById('creator-o2').value, document.getElementById('creator-o3').value, document.getElementById('creator-o4').value] 
        });
        
        document.getElementById('count-soal').innerText = "Soal Terinput: " + bankSoal.length;
        // Reset input soal
        document.getElementById('creator-p').value = "";
        document.getElementById('creator-o1').value = "";
        document.getElementById('creator-o2').value = "";
        document.getElementById('creator-o3').value = "";
        document.getElementById('creator-o4').value = "";
    }

    function startHost() {
        let rid = document.getElementById('input-custom-id').value.trim().toLowerCase();
        if(!rid || bankSoal.length === 0) return alert("Isi ID Room dan minimal 1 soal!");
        
        peer = new Peer(rid); // Menggunakan ID custom pilihan Guru
        
        peer.on('open', id => {
            showView('monitor-area');
            document.getElementById('mon-id').innerText = id.toUpperCase();
        });

        peer.on('connection', c => {
            c.on('data', d => {
                if(d.type === 'join') {
                    // Kirim soal ke siswa yang baru join
                    c.send({ 
                        type: 'start', 
                        soal: bankSoal, 
                        mapel: document.getElementById('input-mapel').value 
                    });
                }
                if(d.type === 'finish') {
                    const row = `<tr><td>${d.nama}</td><td>${d.skor}</td><td>${d.benar}/${d.total}</td><td>${d.waktu}s</td></tr>`;
                    document.getElementById('table-body').innerHTML += row;
                }
            });
        });

        peer.on('error', err => {
            if(err.type === 'unavailable-id') alert("ID Room sudah dipakai orang lain, ganti yang lain!");
            else alert("Terjadi gangguan koneksi.");
            location.reload();
        });
    }

    // FUNGSI SISWA
    function joinRoom() {
        const rid = document.getElementById('input-room').value.trim().toLowerCase();
        const nama = document.getElementById('input-nama').value.trim();
        if(!rid || !nama) return alert("Isi Nama dan ID Room!");

        const btn = document.getElementById('btn-gabung');
        btn.disabled = true; btn.innerText = "MENGHUBUNGKAN...";

        peer = new Peer(); // ID Siswa acak (otomatis)
        
        peer.on('open', () => {
            conn = peer.connect(rid);
            
            conn.on('open', () => {
                conn.send({ type: 'join', nama: nama });
            });

            conn.on('data', d => {
                if(d.type === 'start') {
                    bankSoal = d.soal;
                    document.getElementById('info-mapel').innerText = d.mapel.toUpperCase();
                    startQuiz();
                }
            });
        });

        // Timeout jika room tidak ketemu
        setTimeout(() => {
            if(!bankSoal.length) {
                alert("Room tidak ditemukan! Pastikan ID benar dan Guru sudah mengaktifkan room.");
                location.reload();
            }
        }, 8000);
    }

    function startQuiz() {
        currentIdx = 0; statBenar = 0; startTime = Date.now();
        showView('play-area');
        renderSoal();
    }

    function renderSoal() {
        if(currentIdx >= bankSoal.length) return finishQuiz();
        
        const s = bankSoal[currentIdx];
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${bankSoal.length}`;
        document.getElementById('txt-soal').innerText = s.p;
        
        const list = document.getElementById('list-opsi');
        list.innerHTML = "";
        
        // Acak urutan jawaban agar tidak ketahuan yang benar selalu paling atas
        let options = s.o.filter(val => val !== "").map((txt, i) => ({txt, isCorrect: i === 0}));
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = "opsi";
            b.innerText = opt.txt;
            b.onclick = () => {
                if(opt.isCorrect) {
                    statBenar++;
                    confetti({ particleCount: 30, origin: { y: 0.7 } });
                }
                currentIdx++;
                renderSoal();
            };
            list.appendChild(b);
        });
    }

    function finishQuiz() {
        const totalDetik = Math.floor((Date.now() - startTime) / 1000);
        const skor = Math.round((statBenar / bankSoal.length) * 100);
        
        // Kirim nilai ke Guru
        if(conn) {
            conn.send({ 
                type: 'finish', 
                nama: document.getElementById('input-nama').value, 
                skor: skor, 
                benar: statBenar, 
                total: bankSoal.length, 
                waktu: totalDetik 
            });
        }

        showView('result-area');
        document.getElementById('res-waktu').innerText = totalDetik + "s";
        document.getElementById('res-benar').innerText = statBenar + " / " + bankSoal.length;
        
        let count = 0;
        let itv = setInterval(() => {
            if(count >= skor) {
                document.getElementById('res-skor-anim').innerText = skor;
                clearInterval(itv);
            } else {
                count++;
                document.getElementById('res-skor-anim').innerText = count;
            }
        }, 15);
    }
</script>
</body>
</html>
