<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTRIKU CLOUD GLOBAL 🌍</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #065f46; --secondary: #10b981; --accent: #fbbf24; --bg: #022c22; --card-bg: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0,0,0,0.4); animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); margin: 10px 0; box-sizing: border-box; background: white; color: #1f2937; font-size: 15px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 8px; font-size: 14px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-host { background: linear-gradient(135deg, var(--accent), #f59e0b); color: #022c22; }
        .btn-join { background: linear-gradient(135deg, var(--secondary), #059669); color: white; }
        .btn-latihan { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; }
        #play-area, #creator-area, #monitor-area, #auth-area, #latihan-setup, #result-area, #history-area { display: none; }
        .opsi { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #e5e7eb; border-radius: 16px; background: white; text-align: left; font-weight: 600; cursor: pointer; color: #374151; transition: 0.2s; }
        .opsi:hover { background: #f3f4f6; transform: scale(1.02); }
        .timer { font-size: 20px; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 10px; }
        .progress-table { width: 100%; border-collapse: collapse; background: white; color: #333; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        .progress-table td, .progress-table th { padding: 12px; border: 1px solid #eee; text-align: center; font-size: 13px; }
        .progress-table tr:hover { background: #f9fafb; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="header-logo" style="text-align:center; padding: 20px 0;">
        <h1 style="color:var(--accent); letter-spacing:-1px; margin:0">SANTRIKU CLOUD</h1>
        <p style="opacity: 0.7; font-size: 12px;">EDUKASI DIGITAL GLOBAL 🌍</p>
    </div>

    <div id="auth-user-area">
        <div class="card">
            <h3>PINTU MASUK SANTRI</h3>
            <input type="text" id="user-account-name" placeholder="Masukkan Username / Nama">
            <button class="btn btn-join" onclick="loginUser()">MASUK KE SISTEM</button>
        </div>
    </div>

    <div id="setup-area" style="display:none">
        <div class="card">
            <div class="badge" style="color: #a78bfa; margin-bottom:10px; display:block">PROGRES BELAJAR SAYA</div>
            <div id="history-list">
                <p style="font-size:12px; opacity:0.8">Belum ada pelajaran yang dikerjakan.</p>
            </div>
        </div>

        <div class="card">
            <div class="badge" style="color: var(--secondary);">MULAI PELAJARAN BARU</div>
            <button class="btn btn-latihan" onclick="showView('latihan-setup')">PILIH MATA PELAJARAN</button>
        </div>

        <div class="card">
            <div class="badge" style="color: var(--accent);">GURU / PENGAJAR</div>
            <button class="btn btn-outline" onclick="showView('auth-area')">PANEL KONTROL GURU</button>
        </div>
    </div>

    <div id="latihan-setup">
        <div class="card">
            <h3>Pilih Materi & Jenjang</h3>
            <input type="text" id="ai-mapel" placeholder="Contoh: Fisika, Tafsir, Biologi...">
            <select id="ai-level-tier">
                <option value="TK/PAUD">TK / PAUD</option>
                <option value="SD/MI">SD / MI</option>
                <option value="SMP/MTs">SMP / MTs</option>
                <option value="SMA/MA">SMA / MA / SMK</option>
                <option value="UNIVERSITAS">Perguruan Tinggi</option>
            </select>
            <button class="btn btn-latihan" onclick="startAISession()">MULAI BELAJAR</button>
            <button class="btn btn-outline" onclick="showView('setup-area')">KEMBALI</button>
        </div>
    </div>

    <div id="play-area">
        <div class="timer" id="timer-display">01:00</div>
        <div class="card" style="background: white; color: #1f2937;">
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:bold; color:var(--primary); margin-bottom:10px;">
                <span id="info-mapel"></span>
                <span id="progress-text"></span>
            </div>
            <h3 id="txt-soal" style="font-size: 17px;"></h3>
            <div id="list-opsi"></div>
        </div>
    </div>

    <div id="result-area">
        <div class="card" style="background:white; color:#1f2937; text-align:center;">
            <h2 id="res-title">LEVEL SELESAI!</h2>
            <div class="stat-circle" id="res-skor-anim" style="width:80px; height:80px; margin:10px auto; border:4px solid var(--secondary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:bold">0</div>
            <p id="res-quote" style="font-style: italic; color: #555; font-size:13px; padding:10px;"></p>
            <div id="res-action"></div>
            <button class="btn btn-outline" onclick="showView('setup-area')" style="color:#333; border-color:#ccc">KEMBALI KE MENU</button>
        </div>
    </div>

    <div id="auth-area">
        <div class="card"><h2>Panel Guru</h2><input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password"><button class="btn btn-join" onclick="handleLogin()">MASUK</button><button class="btn btn-outline" onclick="showView('setup-area')">BATAL</button></div>
    </div>
</div>

<script>
    let currentUser = "";
    let currentLvl = 1, currentMapel = "", currentTier = "";
    let bankSoal = [], currentIdx = 0, statBenar = 0;
    let timerInterval, timeLeft = 0;

    // --- SISTEM AKUN & PROGRESS ---
    function loginUser() {
        const name = document.getElementById('user-account-name').value.trim();
        if(!name) return alert("Masukkan nama!");
        currentUser = name;
        document.getElementById('auth-user-area').style.display = 'none';
        showView('setup-area');
        loadUserProgress();
    }

    function saveProgress(mapel, tier, level) {
        let data = JSON.parse(localStorage.getItem('santri_progress') || "{}");
        if(!data[currentUser]) data[currentUser] = [];
        
        let idx = data[currentUser].findIndex(x => x.mapel === mapel && x.tier === tier);
        if(idx > -1) {
            if(level > data[currentUser][idx].level) data[currentUser][idx].level = level;
        } else {
            data[currentUser].push({ mapel, tier, level });
        }
        localStorage.setItem('santri_progress', JSON.stringify(data));
        loadUserProgress();
    }

    function loadUserProgress() {
        let data = JSON.parse(localStorage.getItem('santri_progress') || "{}");
        const list = document.getElementById('history-list');
        if(!data[currentUser] || data[currentUser].length === 0) return;

        let html = `<table class="progress-table"><tr><th>Mapel</th><th>Lvl</th><th>Aksi</th></tr>`;
        data[currentUser].forEach(item => {
            html += `<tr onclick="resumeGame('${item.mapel}', '${item.tier}', ${item.level})">
                <td>${item.mapel}</td>
                <td>${item.level}</td>
                <td style="color:var(--secondary); font-weight:bold">LANJUT</td>
            </tr>`;
        });
        html += `</table>`;
        list.innerHTML = html;
    }

    function resumeGame(mapel, tier, level) {
        currentMapel = mapel;
        currentTier = tier;
        currentLvl = level;
        generateLevelSoal();
    }

    // --- LOGIKA GENERATOR SOAL (1000 LEVEL LOGIC) ---
    function startAISession() {
        currentMapel = document.getElementById('ai-mapel').value.toUpperCase() || "UMUM";
        currentTier = document.getElementById('ai-level-tier').value;
        currentLvl = 1;
        generateLevelSoal();
    }

    function generateLevelSoal() {
        bankSoal = [];
        // Jumlah soal meningkat tiap level: Level 1 = 5, Lvl 2 = 7, Lvl 3 = 9...
        const jmlSoal = 5 + (currentLvl - 1) * 2; 
        
        // Timer dinamis: Level rendah 1 menit, semakin tinggi semakin bertambah sedikit
        timeLeft = 60 + (currentLvl * 5); 

        const difficulty = currentLvl <= 10 ? "Mendasar" : (currentLvl <= 50 ? "Menengah" : "Tingkat Lanjut");

        for(let i = 0; i < jmlSoal; i++) {
            bankSoal.push({
                p: `[${currentTier}] Pertanyaan ${i+1} (Level ${currentLvl}): Apa konsep ${difficulty} dari ${currentMapel} yang harus dikuasai?`,
                o: ["Jawaban Benar Tingkat " + currentLvl, "Opsi Salah A", "Opsi Salah B", "Opsi Salah C"]
            });
        }
        startQuiz();
    }

    // --- GAME ENGINE ---
    function startQuiz() {
        currentIdx = 0; statBenar = 0;
        showView('play-area');
        startTimer();
        renderSoal();
    }

    function startTimer() {
        clearInterval(timerInterval);
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("Waktu Habis!");
                finishQuiz();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }

    function renderSoal() {
        if(currentIdx >= bankSoal.length) return finishQuiz();
        
        const s = bankSoal[currentIdx];
        document.getElementById('info-mapel').innerText = `${currentMapel} - LVL ${currentLvl}`;
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${bankSoal.length}`;
        document.getElementById('txt-soal').innerText = s.p;
        
        const list = document.getElementById('list-opsi');
        list.innerHTML = "";
        
        let shuffled = s.o.map((txt, i) => ({txt, isCorrect: i === 0})).sort(() => Math.random() - 0.5);
        shuffled.forEach(opt => {
            const b = document.createElement('button');
            b.className = "opsi";
            b.innerText = opt.txt;
            b.onclick = () => {
                if(opt.isCorrect) { statBenar++; confetti({ particleCount: 50, spread: 70 }); }
                currentIdx++;
                renderSoal();
            };
            list.appendChild(b);
        });
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        const skor = Math.round((statBenar / bankSoal.length) * 100);
        const lulus = skor >= 75;
        
        showView('result-area');
        document.getElementById('res-skor-anim').innerText = skor + "%";
        
        // Quotes sesuai Mapel
        const quotes = {
            "TAHFIDZ": "Penghafal Al-Qur'an adalah keluarga Allah di bumi.",
            "FISIKA": "Alam semesta ditulis dalam bahasa matematika.",
            "UMUM": "Pendidikan adalah senjata paling mematikan di dunia."
        };
        document.getElementById('res-quote').innerText = quotes[currentMapel] || "Teruslah belajar untuk mencapai cita-citamu!";

        const action = document.getElementById('res-action');
        if(lulus) {
            saveProgress(currentMapel, currentTier, currentLvl + 1);
            action.innerHTML = `<button class="btn btn-join" onclick="nextLevel()">LANJUT KE LEVEL ${currentLvl + 1}</button>`;
        } else {
            action.innerHTML = `<button class="btn btn-latihan" onclick="generateLevelSoal()">ULANGI LEVEL ${currentLvl}</button>`;
        }
    }

    function nextLevel() {
        currentLvl++;
        generateLevelSoal();
    }

    function showView(id) {
        const views = ['setup-area', 'latihan-setup', 'play-area', 'result-area', 'auth-area', 'auth-user-area'];
        views.forEach(v => {
            const el = document.getElementById(v);
            if(el) el.style.display = 'none';
        });
        document.getElementById(id).style.display = 'block';
    }
</script>
</body>
</html>
