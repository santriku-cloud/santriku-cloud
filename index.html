<script>
    // --- DATABASE KONTEN (QUOTES & JENIS MAPEL) ---
    const mapelData = {
        "TAHFIDZ": { q: "Al-Qur'an adalah cahaya hati.", color: "#059669" },
        "FISIKA": { q: "Fisika adalah cara alam semesta bekerja.", color: "#2563eb" },
        "UMUM": { q: "Ilmu adalah jendela dunia.", color: "#d97706" },
        "TK": { q: "Bermain adalah cara belajar terbaik!", color: "#db2777" }
    };

    let currentUser = null;
    let currentLevel = 1;
    let timerInterval;

    // --- MANAJEMEN AKUN & PROGRESS ---
    function createStudentAccount() {
        const id = document.getElementById('user-id').value.trim();
        if(!id) return alert("Silakan buat ID Pengguna!");
        currentUser = id;
        localStorage.setItem('active_user', id);
        showView('setup-area');
        updateHistoryTable();
    }

    // Mengambil riwayat belajar dari memori browser lokal
    function updateHistoryTable() {
        const history = JSON.parse(localStorage.getItem(`hist_${currentUser}`)) || [];
        const container = document.getElementById('progress-list');
        document.getElementById('progress-dashboard').style.display = history.length ? 'block' : 'none';
        
        container.innerHTML = history.map(h => `
            <div class="card" style="background:white; color:#333; padding:12px; margin:8px 0; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <strong style="color:var(--primary)">${h.mapel}</strong><br>
                    <small>Terakhir: Level ${h.level}</small>
                </div>
                <button class="btn-join" style="width:auto; padding:5px 15px; font-size:12px;" 
                    onclick="lanjutLevel('${h.mapel}', ${h.level})">LANJUT</button>
            </div>
        `).join('');
    }

    // --- LOGIKA GENERATOR 1000 SOAL ---
    function generateAISoal() {
        const mapel = document.getElementById('ai-mapel').value.toUpperCase() || "UMUM";
        startLevelSession(mapel, 1);
    }

    function lanjutLevel(mapel, lastLevel) {
        startLevelSession(mapel, lastLevel + 1);
    }

    function startLevelSession(mapel, level) {
        currentLevel = level;
        const levelTier = document.getElementById('ai-level').value;
        
        // Aturan Level: Soal bertambah 2 setiap naik level (Level 1=5, Lvl 2=7, Lvl 3=9, dst)
        const jmlSoal = 5 + (level * 2); 
        // Waktu: Level 1=60 detik, tiap naik level tambah 15 detik
        const limitWaktu = 45 + (level * 15); 
        
        bankSoal = [];
        for(let i = 0; i < jmlSoal; i++) {
            let kesulitan = level > 10 ? "Mahir" : "Dasar";
            bankSoal.push({
                p: `[Level ${level}] Pertanyaan ${i+1}: Apa konsep ${kesulitan} dari ${mapel} bagi siswa ${levelTier.toUpperCase()}?`,
                o: [`Jawaban Benar ${i}`, `Opsi Salah X`, `Opsi Salah Y`, `Opsi Salah Z`]
            });
        }

        startQuiz(limitWaktu);
        document.getElementById('info-mapel').innerText = `${mapel} | LVL ${level}`;
    }

    function startQuiz(detik) {
        currentIdx = 0; statBenar = 0; startTime = Date.now();
        showView('play-area');
        renderSoal();
        
        let sisa = detik;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            sisa--;
            if(sisa <= 0) {
                clearInterval(timerInterval);
                alert("Waktu Habis!");
                finishQuiz();
            }
        }, 1000);
    }

    function finishQuiz() {
        clearInterval(timerInterval);
        const skor = Math.round((statBenar / bankSoal.length) * 100);
        const mapelActive = document.getElementById('ai-mapel').value.toUpperCase() || "UMUM";

        if(skor >= 70) {
            // SIMPAN PROGRESS HANYA JIKA LULUS (SKOR > 70)
            let history = JSON.parse(localStorage.getItem(`hist_${currentUser}`)) || [];
            let idx = history.findIndex(x => x.mapel === mapelActive);
            
            if(idx > -1) history[idx].level = currentLevel;
            else history.push({ mapel: mapelActive, level: currentLevel });
            
            localStorage.setItem(`hist_${currentUser}`, JSON.stringify(history));
            
            // Animasi & Quotes
            const pesan = mapelData[mapelActive]?.q || "Pekerjaan bagus! Teruslah belajar.";
            alert(`SELAMAT! Level ${currentLevel} Selesai.\n\n"${pesan}"`);
            confetti({ strokeWidth: 2, colors: ['#fbbf24', '#10b981'] });
        } else {
            alert(`Skor Anda ${skor}. Minimal 70 untuk naik level!`);
        }
        
        showView('result-area');
        updateHistoryTable();
    }

    // Cek akun saat loading
    window.onload = () => {
        const user = localStorage.getItem('active_user');
        if(user) {
            currentUser = user;
            showView('setup-area');
            updateHistoryTable();
        } else {
            showView('account-area');
        }
    };
</script>
